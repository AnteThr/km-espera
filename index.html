<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2b7d73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Km Espera">
  <!-- manifest is injected dynamically to include ?key= in start_url -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>KilometraÅ¾a Espera v6.1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 1000;
      background: #2b7d73;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #splash .logo {
      width: 96px; height: 96px; border-radius: 20px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; font-weight: 700; color: #fff;
    }
    #splash .title { color: #fff; margin-top: 16px; font-size: 18px; font-weight: 500; }
    #splash .loader { margin-top: 24px; width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-screen {
      position: fixed; inset: 0; z-index: 999;
      background: #fff;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
    }
    #error-screen h2 { color: #c00; margin-bottom: 12px; }
    #error-screen p { color: #555; margin-bottom: 20px; }
    #error-screen button {
      padding: 12px 28px; border: none; border-radius: 8px;
      background: #2b7d73; color: #fff; font-size: 16px; cursor: pointer;
    }

    #install-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1001;
      background: #fff; border-top: 1px solid #ddd;
      padding: 12px 16px; display: none;
      align-items: center; gap: 12px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    }
    #install-banner .ib-icon {
      width: 48px; height: 48px; border-radius: 10px;
      background: #2b7d73; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    #install-banner .ib-text { flex: 1; }
    #install-banner .ib-text strong { display: block; font-size: 14px; }
    #install-banner .ib-text span { font-size: 12px; color: #777; }
    #install-banner .ib-btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      background: #2b7d73; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    #install-banner .ib-close {
      background: none; border: none; font-size: 20px; color: #999; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div class="logo">KM</div>
    <div class="title">KilometraÅ¾a Espera</div>
    <div class="loader"></div>
  </div>

  <!-- Error screen -->
  <div id="error-screen">
    <h2>Nema pristupa</h2>
    <p id="error-msg">Nedostaje kljuÄ (?key=...) u URL-u.</p>
    <button onclick="location.reload()">PokuÅ¡aj ponovo</button>
  </div>

  <!-- Install banner -->
  <div id="install-banner">
    <div class="ib-icon">KM</div>
    <div class="ib-text">
      <strong>Km Espera</strong>
      <span>Instaliraj aplikaciju</span>
    </div>
    <button class="ib-btn" id="ib-install">Instaliraj</button>
    <button class="ib-close" id="ib-close">&times;</button>
  </div>

  <script>
    // ---- CONFIG ----
    var GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbwHfgO5DKb7gZeMLFSGMSgHS03RsgmJIJPSlVtU9oTtEWRYy1GtV0oOW5nL2vdz6Ag-xA/exec';
    // ---- END CONFIG ----

    var params = new URLSearchParams(window.location.search);
    var userKey = params.get('key');
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone === true;

    // ---- DYNAMIC MANIFEST ----
    // Must be injected BEFORE beforeinstallprompt fires
    if (userKey) {
      var manifest = {
        name: "Kilometra\u017ea Espera v6.1",
        short_name: "Km Espera",
        description: "Evidencija kilometra\u017ee vozila",
        start_url: "./index.html?key=" + encodeURIComponent(userKey),
        display: "standalone",
        orientation: "portrait",
        background_color: "#2b7d73",
        theme_color: "#2b7d73",
        lang: "hr",
        icons: [
          { src: "icon-192.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: "icon-512.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ]
      };
      var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    }

    if (!userKey) {
      // No key at all â€” show error
      document.getElementById('splash').style.display = 'none';
      document.getElementById('error-screen').style.display = 'flex';
    } else if (isStandalone) {
      // Launched from home screen as installed PWA â€” redirect immediately
      window.location.replace(GAS_BASE_URL + '?key=' + encodeURIComponent(userKey));
    } else {
      // Opened in browser â€” show splash, wait for possible install, then redirect
      // Give the install banner time to appear before redirecting
      var redirectTimer = setTimeout(function() {
        window.location.replace(GAS_BASE_URL + '?key=' + encodeURIComponent(userKey));
      }, 3000);

      // If user clicks install, cancel the redirect
      window._cancelRedirect = function() {
        clearTimeout(redirectTimer);
      };
    }

    // ---- SERVICE WORKER ----
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        console.log('SW registered:', reg.scope);
      }).catch(function(err) {
        console.warn('SW registration failed:', err);
      });
    }

    // ---- INSTALL PROMPT ----
    var deferredPrompt = null;
    var banner = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) {
        // Cancel auto-redirect so user can install
        if (window._cancelRedirect) window._cancelRedirect();
        banner.style.display = 'flex';
      }
    });

    document.getElementById('ib-install').addEventListener('click', function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          deferredPrompt = null;
          banner.style.display = 'none';
          // After install choice, redirect to app
          setTimeout(function() {
            window.location.replace(GAS_BASE_URL + '?key=' + encodeURIComponent(userKey));
          }, 500);
        });
      }
    });

    document.getElementById('ib-close').addEventListener('click', function() {
      banner.style.display = 'none';
      // User declined install â€” redirect to app
      window.location.replace(GAS_BASE_URL + '?key=' + encodeURIComponent(userKey));
    });

    window.addEventListener('appinstalled', function() {
      banner.style.display = 'none';
    });
  </script>

</body>
</html>
